<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>logs</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="logs">
  <main class="page">
    <section class="dashboard-view dashboard-view-narrow">
      <section id="message" class="message hidden" aria-live="polite"></section>

      <header class="dashboard-header">
        <button type="button" id="back-button" class="link-button" data-back-href="account.html">back</button>
      </header>

      <section class="sector-page sector-page-plain">

        <section class="stack">
          <section class="calendar-popup calendar-inline" aria-label="account logs calendar">
            <div class="calendar-header">
              <button class="calendar-nav" id="calendar-prev-button" type="button" aria-label="previous month">&lt;</button>
              <p class="calendar-month" id="calendar-month-title"></p>
              <button class="calendar-nav" id="calendar-next-button" type="button" aria-label="next month">&gt;</button>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
            </div>
            <div class="calendar-grid" id="calendar-grid-body"></div>
          </section>

          <section id="day-log-panel" class="stack day-log-panel hidden">
            <div>
              <h3 id="selected-day-title" class="day-log-title"></h3>
            </div>

            <div class="stack">
              <div>
                <p class="muted">week word</p>
                <p id="selected-week-word" class="account-value"></p>
              </div>

              <div>
                <p class="muted">completed tasks</p>
                <div id="selected-tasks-list" class="stack stack-tight"></div>
              </div>

              <div>
                <p class="muted">timer resets</p>
                <div id="selected-resets-list" class="stack stack-tight"></div>
              </div>
            </div>
          </section>
        </section>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/better-app.js"></script>
  <script src="js/logs.js"></script>
</body>
</html>
