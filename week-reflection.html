<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>week reflect | to2better</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="week-reflect">
  <main class="page">
    <section class="dashboard-view dashboard-view-narrow">
      <section id="message" class="message hidden" aria-live="polite"></section>

      <header class="dashboard-header">
        <button type="button" id="back-button" class="link-button" data-back-href="reflect.html">back</button>
      </header>

      <section class="sector-page sector-page-plain">
        <div class="panel-heading">
          <div>
            <p id="week-reflect-dates" class="muted"></p>
          </div>
        </div>

        <section class="stack week-reflect-view">
          <div>
            <p class="muted">word</p>
            <button id="week-reflect-word" type="button" class="timer-name-button account-value"></button>
          </div>

          <label class="field field-left">
            <span id="week-reflect-status">reflect</span>
            <textarea id="week-reflect-input" class="reflect-textarea" rows="8" placeholder="write your reflect"></textarea>
          </label>

          <div class="section-actions">
            <button id="save-week-reflect-button" type="button" class="link-button">save reflect</button>
          </div>
        </section>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/better-app.js"></script>
  <script src="js/week-reflection.js"></script>
</body>
</html>
