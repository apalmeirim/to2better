<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>timers | addiction</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="timer-view">
      <section id="message" class="message hidden" aria-live="polite"></section>

      <div class="toolbar">
        <p id="user-email" class="muted"></p>
        <button id="sign-out-button" type="button" class="link-button">sign out</button>
      </div>

      <button id="create-timer-button" type="button" class="link-button create-link">create timer</button>

      <section id="timers-list" class="stack" aria-live="polite"></section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/timer.js"></script>
</body>
</html>
