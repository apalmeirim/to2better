<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reset password | to2better</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="auth-view compact-view">
      <section id="message" class="message hidden" aria-live="polite"></section>

      <header class="small-header">
        <h1>to2better</h1>
      </header>

      <form id="reset-form" class="stack">
        <label class="field">
          <span>new password</span>
          <input id="password" name="password" type="password" autocomplete="new-password" required>
        </label>

        <div class="nav-links compact-links">
          <button type="submit" class="link-button">update password</button>
          <a href="signin.html">back</a>
        </div>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/reset.js"></script>
</body>
</html>
