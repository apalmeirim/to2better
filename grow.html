<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="grow">
  <main class="page">
    <section class="dashboard-view dashboard-view-narrow">
      <section id="message" class="message hidden" aria-live="polite"></section>

      <header class="dashboard-header">
        <button type="button" id="back-button" class="link-button">back</button>
      </header>

      <section class="sector-page sector-page-plain">
        <div class="panel-heading">
          <div>
            <h2>grow</h2>
            <div class="section-actions">
              <button id="create-grow-button" type="button" class="link-button">add</button>
            </div>
          </div>
        </div>

        <div id="grow-list" class="stack" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/better-app.js"></script>
  <script src="js/growth.js"></script>
</body>
</html>
