<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>settings | to2better</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="settings">
  <main class="page">
    <section class="dashboard-view dashboard-view-narrow">
      <section id="message" class="message hidden" aria-live="polite"></section>

      <header class="dashboard-header">
        <button type="button" id="back-button" class="link-button" data-back-href="account.html">back</button>
      </header>

      <section class="sector-page sector-page-plain">

        <section class="stack">
          <div>
            <p class="muted">email</p>
            <p id="account-email" class="account-value"></p>
          </div>

          <div class="stack settings-actions">
            <button id="reset-password-button" type="button" class="link-button">update password</button>
            <button id="reset-data-button" type="button" class="link-button">reset all data</button>
            <button id="delete-account-button" type="button" class="link-button">delete account</button>
          </div>

        </section>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/better-app.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
